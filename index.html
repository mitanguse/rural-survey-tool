<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>中国农村调查 - 批量提取工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f5f0e8;color:#333;max-width:900px;margin:0 auto;padding:15px}
h1{text-align:center;color:#8b4513;margin-bottom:10px;font-size:22px}
h2{color:#8b4513;font-size:16px;margin:15px 0 8px;border-bottom:2px solid #d4a04a;padding-bottom:4px}
.card{background:#fff;border:1px solid #d4a04a;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
label{font-size:13px;color:#666;min-width:80px}
input[type="file"],input[type="password"],select{flex:1;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:13px;min-width:200px}
input[type="password"]{width:300px}
textarea{width:100%;height:200px;border:1px solid #ccc;border-radius:6px;padding:8px;font-size:13px;font-family:inherit}
.btn{background:#8b4513;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:0.2s;margin:4px}
.btn:hover{background:#a0522d}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn3{background:#4ecca3;color:#333}
.status{padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0;display:none}
.status.info{background:#e8f4e8;color:#2d7d2d;display:block}
.status.err{background:#fce8e8;color:#c0392b;display:block}
.status.load{background:#fff8e1;color:#b8860b;display:block}
table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:left;word-break:break-all}
th{background:#8b4513;color:#fff;position:sticky;top:0}
td{background:#fff;font-size:11px}
tr:nth-child(even) td{background:#faf6f0}
#resultArea{max-height:500px;overflow:auto}
.tip{font-size:12px;color:#999;margin-top:4px}
.hidden{display:none}
.footer{text-align:center;font-size:11px;color:#aaa;margin-top:20px}
pre{white-space:pre-wrap;font-size:12px;background:#faf6f0;padding:10px;border-radius:6px;max-height:300px;overflow:auto}
</style>
</head>
<body>
<h1>📋 中国农村调查 · 批量提取工具</h1>

<div class="card">
<h2>⚙️ 配置</h2>
<div class="row"><label>DeepSeek API Key</label><input type="password" id="apiKey" placeholder="sk-..."></div>
<div class="row">
<label>模型</label>
<select id="modelSel">
<option value="deepseek-chat">DeepSeek Chat</option>
<option value="deepseek-v4-flash" selected>DeepSeek V4 Flash</option>
</select>
</div>
</div>

<div class="card">
<h2>📤 方式一：上传文件</h2>
<div class="row"><label>选择docx文件</label><input type="file" id="fileInput" accept=".doc,.docx" multiple></div>
<p class="tip">支持doc和docx格式，直接上传即可，一次可选多个文件</p>
</div>

<div class="card">
<h2>📝 方式二：粘贴文本</h2>
<div class="row"><label>粘贴访谈内容</label></div>
<textarea id="textInput" placeholder="把访谈内容直接粘贴到这里..."></textarea>
</div>

<button class="btn" onclick="startExtract()" id="extractBtn">🚀 开始提取</button>
<button class="btn" style="background:#d4a04a" onclick="showDebugText()">🔍 查看提取的文本</button>
<div class="status" id="statusMsg">准备就绪</div>

<div class="card hidden" id="resultCard">
<h2>📊 提取结果</h2>
<button class="btn btn3" onclick="exportCSV()">📥 导出CSV</button>
<div id="resultArea"></div>
</div>

<div class="footer">Powered by DeepSeek · 数据仅保存在浏览器本地</div>

<script>
// ===== 变量清单 =====
const VAR_LIST = [
'受访者编号','受访者姓名','性别','出生年份','首次采访时间','首访时年龄','籍贯','土改时阶级成分','土改时是否干部','干部经历','曾担任的干部具体职务','是否党员','个人经历简述','现家庭人口','现承包地面积','现承包林地面积','现承包水塘面积','所在社区基本情况','土改前家庭人口数','土改前劳动力人数','土改前劳动力是否紧缺','土改前生活水平自评','土改前主要收入来源','土改前是否欠债','土改前是否放债','土改前自有土地数量','土改前租入土地数量','土改前租出土地数量','土改前经营土地总面积','地租形式','土改前是否拥有耕牛','土改前农具是否齐全','土改前换工行为','土改前赋税负担感受','土改前与地主关系','土改前与贫雇农关系','土改前宗族势力','土改前对土地渴望程度','土改前是否听说要土改','听说土改时的反应','土改前对共产党印象','对工作队公正性评价','是否听过土改宣传','参加土改会议积极性','是否为土改积极分子','是否参加农会贫协会','土改最终划定成分','对划分成分接受度','是否对地主表示同情','参与斗地主诉苦程度','是否分到土地','分得土地数量','是否分到其他财产','分到的主要财产','对分得土地质量满意度','对分配公平性看法','是否经历土改复查','是否颁发土地证','土改后家庭土地总面积','土改后粮食产量变化','土改后生产积极性变化','土改后土地是否有买卖租赁','土改后生活水平变化','土改后粮食够吃程度','对地主家土改后生活描述','土改后与地主家庭交往','与其他农户关系变化','土改后与村干部关系','土改后社会地位感受','土改后土地观','土改后阶级人际观','土改后对共产党拥护程度','对土改运动整体评价','对土改印象最深的事','入社时间','对集体化态度','对集体化作用评价'
];

let allResults = [];

// ===== 读取docx文本 =====
function readDocxText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const zip = new JSZip();
                zip.loadAsync(e.target.result).then(function(zipData) {
                    const docFile = zipData.file('word/document.xml');
                    if (!docFile) { reject(new Error('不是有效的docx文件')); return; }
                    docFile.async('string').then(function(xml) {
                        const texts = [];
                        const matches = xml.match(/<w:t[^>]*>([^<]+)<\/w:t>/g);
                        if (matches) matches.forEach(function(m) {
                            const text = m.replace(/<[^>]+>/g, '');
                            if (text.trim()) texts.push(text);
                        });
                        resolve(texts.join(''));
                    });
                }).catch(function(e) { reject(new Error('解压失败: ' + e.message)); });
            } catch(e) { reject(new Error('读取失败: ' + e.message)); }
        };
        reader.onerror = function() { reject(new Error('文件读取失败')); };
        reader.readAsArrayBuffer(file);
    });
}

// ===== 读取doc文本（二进制解析）=====
function readDocText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const buf = e.target.result;
                // doc文件内部文本以UTF-16LE编码存储
                // 尝试用UTF-16LE解码整个文件
                const decoder = new TextDecoder('utf-16le', {fatal: false});
                const fullText = decoder.decode(buf);
                
                // 过滤出可读的中文和英文字符
                let result = '';
                let current = '';
                for (let i = 0; i < fullText.length; i++) {
                    const c = fullText[i];
                    const code = c.charCodeAt(0);
                    // 保留中文、英文、数字、常见标点和换行
                    if ((code >= 0x4E00 && code <= 0x9FFF) || // 中文
                        (code >= 0x3000 && code <= 0x303F) || // 中文标点
                        (code >= 0xFF00 && code <= 0xFFEF) || // 全角字符
                        (code >= 0x20 && code <= 0x7E) ||    // ASCII可打印
                        code === 0x0A || code === 0x0D ||    // 换行
                        code === 0x9 ||                      // 制表符
                        (code >= 0x2010 && code <= 0x206F))  // 常见符号
                    {
                        current += c;
                        if (current.length > 2) { result += c; }
                    } else {
                        if (current.length > 3) { result += '\n'; }
                        current = '';
                    }
                }
                
                if (result.length < 100) {
                    // 如果提取的文本太少，尝试另一种方式
                    // 直接取整个解码文本中中文连续段落
                    result = '';
                    let chunk = '';
                    for (let i = 0; i < fullText.length; i++) {
                        const c = fullText[i];
                        if ((c >= '\u4e00' && c <= '\u9fff') || c === '\n' || c === '\r') {
                            chunk += c;
                            if (chunk.length > 5) { result += c; }
                        } else {
                            chunk = '';
                        }
                    }
                }
                
                resolve(result || '未能从doc中提取文本，建议转docx后重试');
            } catch(e) { reject(new Error('doc读取失败: ' + e.message)); }
        };
        reader.onerror = function() { reject(new Error('文件读取失败')); };
        reader.readAsArrayBuffer(file);
    });
}

// ===== DeepSeek调用 =====
async function extractWithAI(text, name, apiKey, model) {
    if (!text || text.length < 50) {
        throw new Error("提取的文本太少("+(text?text.length:0)+"字)，建议用方式二粘贴文本");
    }
    const prompt = '你是一个中国农村土地改革口述史研究者。请从以下访谈文本中提取结构化数据，输出为JSON格式。\n\n文件名：' + name + '\n\n访谈文本：\n---\n' + text.substring(0,8000) + '\n---\n\n请提取以下变量（每个变量一行）：\n' + VAR_LIST.map(v=>'- '+v).join('\n') + '\n\n要求：\n1. 找不到的信息填"无数据"\n2. 数值填数字，文本填文本\n3. 分类字段从选项中选择\n4. 注意土地面积单位换算\n5. 只输出JSON对象，不要其他文字';

    const resp = await fetch('https://api.deepseek.com/chat/completions', {
        method: 'POST',
        headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey},
        body: JSON.stringify({
            model: model || 'deepseek-chat',
            messages: [
                {role:'system', content:'你是一个中国农村土地改革口述史研究者，请严格按照要求输出JSON格式数据。'},
                {role:'user', content: prompt}
            ],
            temperature: 0.1
        })
    });
    if (!resp.ok) {
        const err = await resp.text();
        throw new Error('API请求失败: ' + resp.status + ' ' + err.substring(0,200));
    }
    const data = await resp.json();
    const content = data.choices[0].message.content;
    // 尝试从回复中提取JSON
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (jsonMatch) return JSON.parse(jsonMatch[0]);
    return JSON.parse(content);
}

// ===== 主流程 =====
async function startExtract() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const model = document.getElementById('modelSel').value;
    const files = document.getElementById('fileInput').files;
    const pasteText = document.getElementById('textInput').value.trim();

    if (!apiKey) { showStatus('请先输入DeepSeek API Key！', 'err'); return; }
    if (files.length === 0 && !pasteText) { showStatus('请上传文件或粘贴文本！', 'err'); return; }

    document.getElementById('extractBtn').disabled = true;
    allResults = [];

    // 收集所有要处理的文本
    let tasks = [];

    // 粘贴文本
    if (pasteText) {
        tasks.push({text: pasteText, name: '粘贴文本'});
    }

    // 上传文件
    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        showStatus('读取文件: ' + file.name, 'load');
        try {
            let text;
            if (file.name.endsWith('.docx')) {
                text = await readDocxText(file);
            }
            window._lastText = text; else {
                text = await readDocText(file);
            }
            window._lastText = text;
            tasks.push({text: text, name: file.name});
        } catch(e) {
            showStatus('❌ 读取失败: ' + file.name + ' - ' + e.message, 'err');
            allResults.push({文件名: file.name, 错误: '读取失败: ' + e.message});
        }
    }

    // 逐个调用API提取
    for (let i = 0; i < tasks.length; i++) {
        const task = tasks[i];
        showStatus('正在提取 (' + (i+1) + '/' + tasks.length + '): ' + task.name, 'load');
        try {
            const result = await extractWithAI(task.text, task.name, apiKey, model);
            const row = {文件名: task.name};
            VAR_LIST.forEach(v => { row[v] = result[v] || '无数据'; });
            allResults.push(row);
            showStatus('✅ ' + task.name + ' 完成', 'info');
        } catch(e) {
            showStatus('❌ ' + task.name + ' 失败: ' + e.message, 'err');
            allResults.push({文件名: task.name, 错误: e.message});
        }
    }

    showResults();
    document.getElementById('extractBtn').disabled = false;
    showStatus('✅ 完成！共处理 ' + tasks.length + ' 份', 'info');
}

function showResults() {
    if (allResults.length === 0) return;
    document.getElementById('resultCard').classList.remove('hidden');
    let html = '<table><thead><tr><th>#</th><th>文件名</th>';
    const keys = Object.keys(allResults[0]);
    keys.forEach(k => { if (k !== '文件名' && k !== '错误') html += '<th>' + k + '</th>'; });
    if (allResults[0]['错误']) html += '<th>错误</th>';
    html += '</tr></thead><tbody>';
    allResults.forEach((row, idx) => {
        html += '<tr><td>' + (idx+1) + '</td><td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (row['文件名']||'') + '</td>';
        keys.forEach(k => { if (k!=='文件名' && k!=='错误') html += '<td>' + (row[k]||'') + '</td>'; });
        if (row['错误']) html += '<td style="color:#c0392b">' + row['错误'] + '</td>';
        html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('resultArea').innerHTML = html;
}

function exportCSV() {
    if (allResults.length === 0) return;
    const keys = Object.keys(allResults[0]);
    let csv = '\uFEFF';
    csv += keys.join(',') + '\n';
    allResults.forEach(row => {
        const vals = keys.map(k => {
            let v = (row[k]||'').toString();
            if (v.includes(',')||v.includes('"')||v.includes('\n')) v = '"'+v.replace(/"/g,'""')+'"';
            return v;
        });
        csv += vals.join(',') + '\n';
    });
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = '提取结果_' + new Date().toISOString().slice(0,10) + '.csv';
    link.click();
    URL.revokeObjectURL(link.href);
}

function showDebugText() {
    var t = window._lastText || "";
    document.getElementById("statusMsg").className = "status info";
    document.getElementById("statusMsg").innerHTML = "提取到 " + t.length + " 字（前500字预览）：<br><pre>" + t.substring(0,500) + "</pre>";
}
function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.className = 'status ' + type;
    el.textContent = msg;
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
